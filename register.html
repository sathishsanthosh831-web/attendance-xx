<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — EduTrack</title>
  <meta name="description" content="Create a new student or staff account on EduTrack." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: #0f172a; }
    .register-container {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; position: relative;
    }
    .register-card {
      background: var(--surface); border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px rgba(0,0,0,0.4); width: 100%; max-width: 560px;
      animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
      overflow: hidden;
    }
    .register-header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      padding: 28px 32px; display: flex; align-items: center; gap: 16px;
    }
    .register-header-icon {
      width: 52px; height: 52px; border-radius: 12px; background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #fff; flex-shrink: 0;
    }
    .register-header h2 { color: #fff; font-size: 1.4rem; }
    .register-header p { color: rgba(255,255,255,0.75); font-size: 0.825rem; margin: 0; }
    .register-body { padding: 32px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:500px){ .form-row { grid-template-columns: 1fr; } }
    .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .pwd-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-muted); }
  </style>
</head>
<body>
  <div class="register-container">
    <!-- BG -->
    <div class="login-particles" style="position:fixed">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="register-card" style="position:relative;z-index:1">
      <div class="register-header" id="regHeader">
        <div class="register-header-icon" id="regIcon"><i class="fas fa-user-graduate"></i></div>
        <div>
          <h2 id="regTitle">Create Student Account</h2>
          <p id="regSubtitle">Fill in your details to get started</p>
        </div>
      </div>
      <div class="register-body">

        <!-- Type Switcher -->
        <div class="tabs mb-4" id="regTypeTabs" style="margin-bottom:24px">
          <button class="tab-btn active" id="tabTypeStudent" onclick="setType('student')">
            <i class="fas fa-user-graduate"></i> Student
          </button>
          <button class="tab-btn" id="tabTypeStaff" onclick="setType('staff')">
            <i class="fas fa-chalkboard-teacher"></i> Staff
          </button>
        </div>

        <form id="regForm" onsubmit="handleRegister(event)">
          <!-- Common Fields -->
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <div class="input-group">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="regName" class="form-control" placeholder="Enter full name" required />
            </div>
          </div>

          <!-- Student Fields -->
          <div id="studentFields">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Register Number *</label>
                <div class="input-group">
                  <i class="fas fa-id-badge input-icon"></i>
                  <input type="text" id="regRegNo" class="form-control" placeholder="e.g. CS21001" />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Year *</label>
                <select id="regYear" class="form-control">
                  <option value="">Select year</option>
                  <option>1st Year</option>
                  <option>2nd Year</option>
                  <option>3rd Year</option>
                  <option>4th Year</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Staff Fields -->
          <div id="staffFields" class="hidden">
            <div class="form-group">
              <label class="form-label">Staff ID *</label>
              <div class="input-group">
                <i class="fas fa-id-card input-icon"></i>
                <input type="text" id="regStaffId" class="form-control" placeholder="e.g. ST001" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Subjects (comma-separated) *</label>
              <div class="input-group">
                <i class="fas fa-book input-icon"></i>
                <input type="text" id="regSubjects" class="form-control" placeholder="e.g. Maths, Physics, Chemistry" />
              </div>
            </div>
          </div>

          <!-- Department -->
          <div class="form-group">
            <label class="form-label">Department *</label>
            <div class="input-group">
              <i class="fas fa-building input-icon"></i>
              <select id="regDept" class="form-control" required>
                <option value="">Select department</option>
                <option>Computer Science</option>
                <option>Electronics</option>
                <option>Mechanical</option>
                <option>Civil</option>
                <option>Electrical</option>
                <option>Information Technology</option>
                <option>Biotechnology</option>
                <option>Mathematics</option>
              </select>
            </div>
          </div>

          <!-- Username & Password -->
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Username *</label>
              <div class="input-group">
                <i class="fas fa-at input-icon"></i>
                <input type="text" id="regUsername" class="form-control" placeholder="Username" required autocomplete="off" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Password *</label>
              <div class="input-group" style="position:relative">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="regPassword" class="form-control" placeholder="Min 6 chars" required autocomplete="new-password" />
                <span class="pwd-toggle" onclick="togglePwdReg()"><i class="fas fa-eye" id="pwdEyeIcon"></i></span>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password *</label>
            <div class="input-group" style="position:relative">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="regConfirm" class="form-control" placeholder="Repeat password" required />
            </div>
          </div>

          <div class="form-error" id="regError" style="margin-bottom:12px;font-size:0.875rem"></div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="regBtn">
            <i class="fas fa-user-plus"></i> Create Account
          </button>

          <div class="text-center mt-4">
            <span class="text-muted text-sm">Already have an account? </span>
            <a href="index.html" style="font-weight:600">Sign In</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    Theme.init();
    Toast.init();

    let currentType = 'student';

    // Read URL param
    const urlType = new URLSearchParams(window.location.search).get('type');
    if (urlType === 'staff') setType('staff');

    function setType(type) {
      currentType = type;
      document.getElementById('tabTypeStudent').classList.toggle('active', type === 'student');
      document.getElementById('tabTypeStaff').classList.toggle('active', type === 'staff');
      document.getElementById('studentFields').classList.toggle('hidden', type !== 'student');
      document.getElementById('staffFields').classList.toggle('hidden', type !== 'staff');
      if (type === 'student') {
        document.getElementById('regTitle').textContent = 'Create Student Account';
        document.getElementById('regIcon').innerHTML = '<i class="fas fa-user-graduate"></i>';
      } else {
        document.getElementById('regTitle').textContent = 'Create Staff Account';
        document.getElementById('regIcon').innerHTML = '<i class="fas fa-chalkboard-teacher"></i>';
      }
    }

    function togglePwdReg() {
      const input = document.getElementById('regPassword');
      const icon = document.getElementById('pwdEyeIcon');
      if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { input.type = 'password'; icon.className = 'fas fa-eye'; }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const errEl = document.getElementById('regError');
      const btn = document.getElementById('regBtn');
      errEl.style.display = 'none'; errEl.textContent = '';

      const name     = document.getElementById('regName').value.trim();
      const dept     = document.getElementById('regDept').value;
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm  = document.getElementById('regConfirm').value;

      // Validate
      if (!name || !dept || !username || !password) {
        errEl.textContent = 'Please fill in all required fields.';
        errEl.style.display = 'block'; return;
      }
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block'; return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block'; return;
      }

      let data = { type: currentType, name, dept, username, password };

      if (currentType === 'student') {
        const regNo = document.getElementById('regRegNo').value.trim();
        const year  = document.getElementById('regYear').value;
        if (!regNo || !year) {
          errEl.textContent = 'Please fill register number and year.';
          errEl.style.display = 'block'; return;
        }
        data = { ...data, regNo, year };
      } else {
        const staffId  = document.getElementById('regStaffId').value.trim();
        const subjects = document.getElementById('regSubjects').value.trim();
        if (!staffId || !subjects) {
          errEl.textContent = 'Please fill staff ID and subjects.';
          errEl.style.display = 'block'; return;
        }
        data = { ...data, staffId, subjects: subjects.split(',').map(s => s.trim()).filter(Boolean) };
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account...';
      await new Promise(r => setTimeout(r, 400));

      const result = DB.registerUser(data);
      if (!result.success) {
        errEl.textContent = result.error;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        return;
      }

      Toast.success('Account Created!', `Welcome to EduTrack, ${name}!`);
      setTimeout(() => { window.location.href = `index.html?type=${currentType}`; }, 1000);
    }
  </script>
</body>
</html>
